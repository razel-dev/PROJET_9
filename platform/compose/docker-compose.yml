version: "3.9"

name: medilabo
services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_METRICS_ENABLED: "true"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/realms/master/.well-known/openid-configuration || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
    networks: ["backend"]

  assessment-service:
    image: assessment-service:latest
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ENVIRONMENT: ${ENVIRONMENT}
      APP_VERSION: ${APP_VERSION}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${JWKS_URI}
    ports:
      - "8080:8080"
    networks:
      - backend

  api-gateway:
    image: api-gateway:latest
    depends_on:
      assessment-service:
        condition: service_started
      patient-service:
        condition: service_started
      history-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ENVIRONMENT: ${ENVIRONMENT}
      APP_VERSION: ${APP_VERSION}
    ports:
      - "8082:8080"
    networks:
      - backend

  patient-service:
    image: patient-service:latest
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ENVIRONMENT: ${ENVIRONMENT}
      APP_VERSION: ${APP_VERSION}
    ports:
      - "8083:8080"
    networks:
      - backend

  history-service:
    image: history-service:latest
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ENVIRONMENT: ${ENVIRONMENT}
      APP_VERSION: ${APP_VERSION}
    ports:
      - "8084:8080"
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.52.0
    profiles: ["observability"]
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on: ["assessment-service"]
    networks:
      - backend

  grafana:
    image: grafana/grafana-oss:10.4.0
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ../observability/grafana/provisioning/:/etc/grafana/provisioning/
    depends_on:
      - prometheus
    networks:
      - backend

networks:
  backend: {}