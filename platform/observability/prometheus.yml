global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'patient-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['patient-service:8080']

  - job_name: 'history-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['history-service:8080']

  - job_name: 'assessment-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['assessment-service:8080']