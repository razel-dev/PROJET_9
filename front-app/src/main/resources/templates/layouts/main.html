<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title layout:title-pattern="$CONTENT_TITLE - Medilabo">Medilabo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-3" role="navigation" aria-label="Navigation principale">
  <div class="container">
    <a class="navbar-brand" th:href="@{/patients}">Médilabo</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
            aria-controls="mainNavbar" aria-expanded="false" aria-label="Basculer la navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link"
             th:href="@{/patients}"
             th:classappend="${#httpServletRequest.requestURI.matches('^/patients.*')} ? ' active' : ''">
            <i class="bi bi-people me-1"></i>Patients
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container" layout:fragment="content"></main>

<footer class="border-top mt-4 py-3">
  <div class="container text-muted small">&copy; Medilabo</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous" defer></script>
</body>
</html>
