<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
  <title>Patients</title>
</head>
<body>
<main layout:fragment="content">
  <nav aria-label="Fil d'Ariane" class="mb-2">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a th:href="@{/patients}">Patients</a></li>
      <li class="breadcrumb-item active" aria-current="page">Liste</li>
    </ol>
  </nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="h4 mb-0">Liste des patients</h2>
    <a class="btn btn-primary" th:href="@{/patients/new}">
      <i class="bi bi-person-plus me-1"></i>Nouveau patient
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped table-hover mb-0 align-middle">
          <thead class="table-light">
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Prénom</th>
            <th scope="col">Nom</th>
            <th scope="col">Né(e) le</th>
            <th scope="col">Genre</th>
            <th scope="col">Adresse postale</th>
            <th scope="col">Téléphone</th>
            <th scope="col" class="text-end">Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="p : ${patients}">
            <td th:text="${p.id}">1</td>
            <td th:text="${p.prenom}">John</td>
            <td th:text="${p.nom}">Doe</td>
            <td th:text="${#temporals.format(p.dateDeNaissance, 'yyyy-MM-dd')}">1985-02-18</td>
            <td>
              <span class="badge bg-secondary"
                    th:text="${p.genre == T(com.medilabo.libs.commons.core.Gender).M ? 'M' 
                              : (p.genre == T(com.medilabo.libs.commons.core.Gender).F ? 'F' : 'Autre')}">M</span>
            </td>
            <td th:text="${p.adressePostale != null ? p.adressePostale : '—'}">—</td>
            <td th:text="${p.numeroTelephone != null ? p.numeroTelephone : '—'}">—</td>
            <td class="text-end">
              <div class="btn-group" role="group" aria-label="Actions patient">
                <a class="btn btn-sm btn-outline-primary"
                   th:href="@{'/patients/' + ${p.id} + '/edit'}"
                   data-bs-toggle="tooltip" data-bs-title="Modifier ce patient">
                  <i class="bi bi-pencil-square me-1"></i>Modifier
                </a>
              </div>
            </td>
          </tr>
          <tr th:if="${patients == null or #lists.isEmpty(patients)}">
            <td colspan="8" class="text-center text-muted py-4">
              <i class="bi bi-people me-1"></i>Aucun patient
            </td>
          </tr>
          </tbody>
        </table>
      </div>
         </div>
  </div>
</main>
</body>
</html>
