name: CI Mono-Repo

on:
  pull_request:
    paths:
      - 'api-gateway/**'
      - 'patient-service/**'
      - 'history-service/**'
      - 'assessment-service/**'
      - 'libs/**'
      - 'pom.xml'
      - '.github/workflows/**'
  push:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      any: ${{ steps.set-matrix.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - name: Detecter les changements
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-gateway:
              - 'api-gateway/**'
            patient-service:
              - 'patient-service/**'
            history-service:
              - 'history-service/**'
            assessment-service:
              - 'assessment-service/**'
            libs:
              - 'libs/**'
            root:
              - 'pom.xml'
      - name: Préparer matrice
        id: set-matrix
        shell: bash
        run: |
          # Push sur main: on build tout
          if [ "${{ github.event_name }}" = "push" ]; then
            echo 'services=["api-gateway","patient-service","history-service","assessment-service"]' >> "$GITHUB_OUTPUT"
            echo 'any=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=()
          # Remplacer l'indexation dynamique steps.filter.outputs[svc]
          # par des vérifications explicites pour chaque service
          if [ "${{ steps.filter.outputs.api-gateway }}" = "true" ]; then
            changed+=("\"api-gateway\"")
          fi
          if [ "${{ steps.filter.outputs.patient-service }}" = "true" ]; then
            changed+=("\"patient-service\"")
          fi
          if [ "${{ steps.filter.outputs.history-service }}" = "true" ]; then
            changed+=("\"history-service\"")
          fi
          if [ "${{ steps.filter.outputs.assessment-service }}" = "true" ]; then
            changed+=("\"assessment-service\"")
          fi

          if [ ${#changed[@]} -eq 0 ]; then
            # Si libs ou pom racine changent, on reconstruit tout
            if [ "${{ steps.filter.outputs.libs }}" = "true" ] || [ "${{ steps.filter.outputs.root }}" = "true" ]; then
              echo 'services=["api-gateway","patient-service","history-service","assessment-service"]' >> "$GITHUB_OUTPUT"
              echo 'any=true' >> "$GITHUB_OUTPUT"
            else
              echo 'services=[]' >> "$GITHUB_OUTPUT"
              echo 'any=false' >> "$GITHUB_OUTPUT"
            fi
          else
            printf 'services=[%s]\n' "$(IFS=,; echo "${changed[*]}")" >> "$GITHUB_OUTPUT"
            echo 'any=true' >> "$GITHUB_OUTPUT"
          fi
  build-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build & Test (sélectif)
        shell: bash
        run: |
          MOD="${{ matrix.service }}"
          ./mvnw -B -T1C -DskipTests=true -Dmaven.test.skip=true -pl "$MOD" -am clean package
